<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Copilot X-Ray 🔬</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Bridge MUST load before any copilot.* use -->
  <script src="/__bridge.js"></script>
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-top">
        <span class="logo">🔬 Copilot X-Ray</span>
        <span id="stats" class="stats">0 events</span>
        <div class="controls">
          <input id="search" type="search" placeholder="Search events…" autocomplete="off" />
          <button id="btn-pause" class="btn">⏸ Pause</button>
          <button id="btn-clear" class="btn btn-danger">🗑 Clear</button>
        </div>
      </div>
      <div id="filters" class="filters"></div>
    </header>

    <main id="event-list">
      <div id="empty" class="empty-state">
        <div class="empty-icon">📡</div>
        <p>Waiting for session events…</p>
        <p class="empty-hint">Events will appear here automatically as the session runs.</p>
      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
